<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NES Emulator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: monospace;
      color: #aaa;
    }
    #container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    canvas {
      width: 512px;
      height: 480px;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      border: 2px solid #333;
    }
    #status { font-size: 14px; }
    #controls { display: flex; gap: 8px; }
    #mute-btn {
      background: #333; color: #aaa; border: 1px solid #555;
      padding: 4px 12px; font-family: monospace; font-size: 13px; cursor: pointer;
    }
    #mute-btn:hover { background: #444; }
  </style>
</head>
<body>
  <div id="container">
    <canvas id="screen" width="256" height="240"></canvas>
    <div id="controls">
      <button id="mute-btn">Mute (M)</button>
    </div>
    <div id="status">Loading ROM...</div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
